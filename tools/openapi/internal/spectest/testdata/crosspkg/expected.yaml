components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          description: Error details with code and message
        meta:
          type: object
          description: Response metadata
      required:
        - error
    IDReq:
      type: object
      properties:
        iD:
          type: integer
          format: int64
      required:
        - iD
    JOSEErrorEnvelope:
      type: object
      properties:
        code:
          type: string
          description: Machine-readable JOSE error code (e.g., JOSE_DECRYPT_FAILED, JOSE_SIGNATURE_INVALID, JOSE_KID_UNKNOWN)
        message:
          type: string
          description: Constant-time generic message — never reveals which key was tried or which library detected the failure
      required:
        - code
        - message
    Money:
      type: object
      properties:
        amount:
          type: integer
          format: int64
        currency:
          type: string
    Order:
      type: object
      properties:
        discount:
          type: integer
        id:
          type: integer
          format: int64
        total:
          $ref: '#/components/schemas/Money'
    RawErrorResponse:
      type: object
      properties:
        code:
          type: string
          description: Machine-readable error code
        message:
          type: string
          description: Human-readable error message
      required:
        - code
        - message
    Receipt:
      type: object
      properties:
        amount:
          type: integer
          format: int64
        currency:
          type: string
        note:
          type: string
    SuccessResponse:
      type: object
      properties:
        data:
          type: object
          description: Response data
        meta:
          type: object
          properties:
            timestamp:
              type: string
              format: date-time
              description: RFC3339 response timestamp
            traceId:
              type: string
              description: W3C trace identifier for the request
