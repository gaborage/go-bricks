openapi: 3.0.1
info:
  title: Catalog API
  version: 1.0.0
  description: Generated API specification
paths:
  /categories:
    get:
      operationId: listCategories
      summary: GET /categories
      tags:
        - categories
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Category'
                  meta:
                    type: object
                    properties:
                      timestamp:
                        type: string
                        format: date-time
                        description: RFC3339 response timestamp
                      traceId:
                        type: string
                        description: W3C trace identifier for the request
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users:
    post:
      operationId: createUser
      summary: POST /users
      tags:
        - users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserReq'
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
                  meta:
                    type: object
                    properties:
                      timestamp:
                        type: string
                        format: date-time
                        description: RFC3339 response timestamp
                      traceId:
                        type: string
                        description: W3C trace identifier for the request
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    Address:
      type: object
      properties:
        city:
          type: string
        street:
          type: string
      required:
        - street
    Category:
      type: object
      properties:
        children:
          type: array
          items:
            $ref: '#/components/schemas/Category'
        name:
          type: string
        parent:
          $ref: '#/components/schemas/Category'
    CreateUserReq:
      type: object
      properties:
        address:
          $ref: '#/components/schemas/Address'
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/Address'
        name:
          type: string
          minLength: 2
      required:
        - name
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          description: Error details with code and message
        meta:
          type: object
          description: Response metadata
      required:
        - error
    JOSEErrorEnvelope:
      type: object
      properties:
        code:
          type: string
          description: Machine-readable JOSE error code (e.g., JOSE_DECRYPT_FAILED, JOSE_SIGNATURE_INVALID, JOSE_KID_UNKNOWN)
        message:
          type: string
          description: Constant-time generic message — never reveals which key was tried or which library detected the failure
      required:
        - code
        - message
    RawErrorResponse:
      type: object
      properties:
        code:
          type: string
          description: Machine-readable error code
        message:
          type: string
          description: Human-readable error message
      required:
        - code
        - message
    SuccessResponse:
      type: object
      properties:
        data:
          type: object
          description: Response data
        meta:
          type: object
          properties:
            timestamp:
              type: string
              format: date-time
              description: RFC3339 response timestamp
            traceId:
              type: string
              description: W3C trace identifier for the request
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        manager:
          $ref: '#/components/schemas/User'
        profile:
          $ref: '#/components/schemas/Address'
        reports:
          type: array
          items:
            $ref: '#/components/schemas/User'
