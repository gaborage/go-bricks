openapi: 3.0.1
info:
  title: Simple API
  version: 1.0.0
  description: Generated API specification
paths:
  /ping:
    get:
      operationId: ping
      summary: GET /ping
      tags:
        - health
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users:
    post:
      operationId: createUser
      summary: Create a user
      tags:
        - users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserReq'
      responses:
        '200':
          description: Resource created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    CreateUserReq:
      type: object
      properties:
        email:
          type: string
          format: email
        name:
          type: string
          minLength: 2
          maxLength: 50
        role:
          type: string
          enum:
            - admin
            - member
            - guest
      required:
        - email
        - name
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          description: Error details with code and message
        meta:
          type: object
          description: Response metadata
      required:
        - error
    JOSEErrorEnvelope:
      type: object
      properties:
        code:
          type: string
          description: Machine-readable JOSE error code (e.g., JOSE_DECRYPT_FAILED, JOSE_SIGNATURE_INVALID, JOSE_KID_UNKNOWN)
        message:
          type: string
          description: Constant-time generic message — never reveals which key was tried or which library detected the failure
      required:
        - code
        - message
    SuccessResponse:
      type: object
      properties:
        data:
          type: object
          description: Response data
        meta:
          type: object
          description: Response metadata
