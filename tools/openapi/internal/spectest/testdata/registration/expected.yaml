openapi: 3.0.1
info:
  title: Storefront API
  version: 1.0.0
  description: Generated API specification
paths:
  /api/version:
    get:
      operationId: version
      summary: GET /api/version
      tags:
        - ops
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /health:
    get:
      operationId: health
      summary: GET /health
      tags:
        - ops
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /items:
    post:
      operationId: createItem
      summary: POST /items
      tags:
        - items
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Item'
      responses:
        "200":
          description: Resource created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/admin/stats:
    get:
      operationId: stats
      summary: GET /v1/admin/stats
      tags:
        - admin
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/items:
    get:
      operationId: listItems
      summary: GET /v1/items
      tags:
        - items
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          description: Error details with code and message
        meta:
          type: object
          description: Response metadata
      required:
        - error
    Item:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
    JOSEErrorEnvelope:
      type: object
      properties:
        code:
          type: string
          description: Machine-readable JOSE error code (e.g., JOSE_DECRYPT_FAILED, JOSE_SIGNATURE_INVALID, JOSE_KID_UNKNOWN)
        message:
          type: string
          description: Constant-time generic message — never reveals which key was tried or which library detected the failure
      required:
        - code
        - message
    SuccessResponse:
      type: object
      properties:
        data:
          type: object
          description: Response data
        meta:
          type: object
          description: Response metadata
