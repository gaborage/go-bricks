              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          description: Error details with code and message
        meta:
          type: object
          description: Response metadata
      required:
        - error
    JOSEErrorEnvelope:
      type: object
      properties:
        code:
          type: string
          description: Machine-readable JOSE error code (e.g., JOSE_DECRYPT_FAILED, JOSE_SIGNATURE_INVALID, JOSE_KID_UNKNOWN)
        message:
          type: string
          description: Constant-time generic message — never reveals which key was tried or which library detected the failure
      required:
        - code
        - message
    OrdersRequest:
      type: object
      properties:
        quantity:
          type: integer
          format: int32
        sku:
          type: string
      required:
        - sku
    RawErrorResponse:
      type: object
      properties:
        code:
          type: string
          description: Machine-readable error code
        message:
          type: string
          description: Human-readable error message
      required:
        - code
        - message
    Request:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email
    SuccessResponse:
      type: object
      properties:
        data:
          type: object
          description: Response data
        meta:
          type: object
          properties:
            timestamp:
              type: string
              format: date-time
              description: RFC3339 response timestamp
            traceId:
              type: string
              description: W3C trace identifier for the request
