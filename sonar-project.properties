sonar.projectKey=gaborage_go-bricks
sonar.organization=gaborage

sonar.projectName=GoBricks
sonar.sources=app,cache,config,database,httpclient,internal,jose,keystore,logger,messaging,migration,multitenant,observability,outbox,scheduler,server,testing,tools,trace
# **/testdata/** — fixture projects are inputs to tests, not production source.
# Their minimal go.mod files have no go.sum, which otherwise trips S8566.
sonar.exclusions=**/*_test.go,**/vendor/**,**/mocks/**,**/*.gen.go,**/testdata/**

sonar.tests=.
sonar.test.inclusions=**/*_test.go
sonar.test.exclusions=**/vendor/**,**/mocks/**

# Coverage configuration
sonar.go.coverage.reportPaths=coverage.out
# Note: tools/** coverage is now included in the merged coverage.out file

# Duplication exclusions — paths excluded from copy-paste detection.
# database/postgresql/connection.go and database/oracle/connection.go are
# vendor-mirror files: both define the same public API surface against
# different driver packages. After W4-B extracted the byte-identical
# Statement/Transaction wrappers into database/internal/wrapper/, the only
# remaining "duplication" the detector flags is the two-line
# `type X = wrapper.X` re-export block plus adjacent existing doc comments
# on Query/Exec methods that legitimately read the same in both vendors
# (they delegate to the same database/sql calls). Excluding these two
# files from CPD avoids false positives for unavoidable mirror code while
# still scanning every other Go file for genuine duplication.
sonar.cpd.exclusions=**/database/postgresql/connection.go,**/database/oracle/connection.go

# Coverage exclusions — paths whose lines should NOT count toward the
# project's coverage percentage. SonarCloud's headline coverage metric is
# computed as covered_lines / (covered_lines + uncovered_lines_in_scope),
# so test-helper packages that intentionally have no coverage drag the
# metric down for no signal value.
#
# - **/cmd/**/main.go — CLI entrypoints are thin glue over cobra.Execute()
#   that would require running the binary to cover. Subcommand wiring is
#   exercised by the tools' own go test.
#
# - **/testing/** — covers both the top-level testing/ helper package and
#   the per-package */testing/ mocks (database/testing, cache/testing,
#   jose/testing, keystore/testing, observability/testing, outbox/testing,
#   testing/containers, testing/fixtures, testing/mocks). These are the
#   test infrastructure, not the test targets — their own coverage is
#   intentionally low because callers are tests that import them rather
#   than tests that exercise them directly. Counting them was suppressing
#   the headline metric below the 80% threshold (per the diagnosis on
#   2026-05-13: ~300+ uncovered lines from test infra alone). The
#   `mocks_test.go` files alongside each mock implementation cover any
#   genuinely-uncovered logic inside the mocks themselves.
sonar.coverage.exclusions=**/cmd/**/main.go,**/testing/**

# Issue suppression - string literal duplication in test data
# Rationale: Test-specific data paths and mock values have no shared semantic meaning
# Extracting them creates unnecessary abstraction (YAGNI principle)
sonar.issue.ignore.multicriteria=e1,e2,e3,e4
sonar.issue.ignore.multicriteria.e1.ruleKey=go:S1192
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*_test.go

# e2, e3 — godre:S8242 ("don't store context.Context in a struct") on the
# scheduler module's two unavoidable context fields. SonarCloud's
# directive engine doesn't honour the inline `//nolint:S8242 // NOSONAR:`
# annotations that golangci-lint reads, so we suppress at the project
# level here with the rationale recorded inline.
#
# - scheduler/job.go    — jobContextImpl embeds context.Context because
#                         the public scheduler.JobContext interface does.
#                         The embed is what allows callers to pass a
#                         JobContext anywhere a context.Context is
#                         expected (OTel propagation, db/messaging ops).
#                         Removing the embed would change the public API
#                         contract.
#
# - scheduler/module.go — Module.shutdownCtx is a lifecycle context, not
#                         a request context. It's a parent for derived
#                         contexts in multiple goroutines (scheduling
#                         loop, per-job spawn, shutdown coordination) and
#                         lives the entire process lifetime. The standard
#                         Go service pattern uses a stored
#                         context+cancel pair here; making it a function
#                         parameter would require threading it through
#                         every goroutine spawn site for negative
#                         architectural payoff.
sonar.issue.ignore.multicriteria.e2.ruleKey=godre:S8242
sonar.issue.ignore.multicriteria.e2.resourceKey=**/scheduler/job.go
sonar.issue.ignore.multicriteria.e3.ruleKey=godre:S8242
sonar.issue.ignore.multicriteria.e3.resourceKey=**/scheduler/module.go

# e4 — godre:S8168 ("Add 'defer tx.Rollback()' after checking the error from BeginTx")
# on database/internal/wrapper/connection.go's Begin and BeginTx methods. These
# are factory functions that intentionally return the *sql.Tx to the caller —
# the caller owns the rollback responsibility. The rule fires identically on
# the same pattern in the postgresql and oracle Connection types pre-W4-C
# (where the issues were marked false-positive in the SonarCloud UI). After
# W4-C centralized the methods into wrapper, the suppression needs to follow.
sonar.issue.ignore.multicriteria.e4.ruleKey=godre:S8168
sonar.issue.ignore.multicriteria.e4.resourceKey=**/database/internal/wrapper/connection.go