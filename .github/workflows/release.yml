name: Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: read
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false
jobs:
  verify-framework:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: go.sum
      - run: go mod download
      - name: Build framework
        run: |
          set -euo pipefail
          packages=$(go list ./... | grep -vE '/tools(/|$)')
          test -n "$packages" || { echo 'no framework packages'; exit 1; }
          go build -v $packages
      - name: Test framework
        run: go test -race ./...
      - name: Verify go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: Vulnerability + security scan
        run: |
          make vuln
          make sec

  verify-cli:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: tools/migration
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: tools/migration/go.sum
      - name: Build + validate CLI
        run: |
          go mod download
          make validate-cli
      - name: Vulnerability + security scan
        run: |
          make vuln
          make sec

  publish:
    needs: [verify-framework, verify-cli]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: false
      - name: Re-fetch the real tag object (actions/checkout #882 can downgrade it)
        env:
          TAG: ${{ github.ref_name }}
        run: git fetch --force origin "refs/tags/${TAG}:refs/tags/${TAG}"
      - name: Reject unfilled allowed_signers placeholder
        run: |
          set -euo pipefail
          test -f .github/allowed_signers || { echo "::error::.github/allowed_signers missing"; exit 1; }
          if grep -qiE 'REPLACE|PASTE_REAL|<.*public.*key.*>' .github/allowed_signers; then
            echo "::error::.github/allowed_signers still has a placeholder"; exit 1
          fi
      - name: Assert annotated + verify SSH signature
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          [ "$(git cat-file -t "$TAG")" = tag ] || { echo "::error::$TAG is not an annotated tag (use 'make release')"; exit 1; }
          git config gpg.format ssh
          git config gpg.ssh.allowedSignersFile .github/allowed_signers
          git tag -v "$TAG"
      - name: Assemble release notes from the CHANGELOG section
        id: notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ver="${TAG#v}"
          notes="$(mktemp)"
          awk -v v="$ver" '
            $0 ~ ("^## \\[v?" v "\\]") {grab=1; next}
            grab && /^## \[/ {exit}
            grab {print}
          ' CHANGELOG.md > "$notes"
          test -s "$notes" || { echo "::error::no CHANGELOG section for $TAG"; exit 1; }
          echo "file=$notes" >> "$GITHUB_OUTPUT"
      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" --verify-tag --title "$TAG" --notes-file "${{ steps.notes.outputs.file }}"
      - name: Clear release-please autorelease:pending label (#1561)
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          set -euo pipefail
          pr="$(gh pr list --state merged --label 'autorelease: pending' --json number --jq '.[0].number // empty')"
          if [ -n "$pr" ]; then
            gh pr edit "$pr" --remove-label 'autorelease: pending' --add-label 'autorelease: tagged'
            echo "Cleared autorelease:pending on PR #$pr"
          else
            echo "No merged autorelease:pending PR found (ok)"
          fi
