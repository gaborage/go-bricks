name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 6 * * 1'   # Mondays 06:17 UTC — weekly vuln re-scan of main

jobs:
  # ============================================================================
  # Job 1: Detect which components changed
  # ============================================================================
  changes:
    permissions:
      contents: read
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    outputs:
      # yamllint: valid GitHub Actions context expression
      framework: ${{ steps.filter.outputs.framework }}
      # yamllint: valid GitHub Actions context expression
      migrate_tool: ${{ steps.filter.outputs.migrate_tool }}
      # `code` = any non-doc change that must run the full coverage + SonarCloud
      # path. It is its OWN explicit filter (see `code:` under `filters:` below),
      # NOT inferred from framework/migrate_tool: those two omit non-Go scan
      # inputs (e.g. sonar-project.properties), so deriving `code` from them
      # would skip the scan on a Sonar-config-only change. The coverage run
      # (framework-test, framework-integration-test, migrate-tool-test, merge,
      # SonarCloud) gates on this; doc-only PRs match nothing and skip it.
      # yamllint: valid GitHub Actions context expression
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v7

      - name: Detect changed paths
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706  # v4.0.2
        id: filter
        with:
          # Filters intentionally match only code-affecting paths. Doc-only
          # changes (`wiki/**`, `CLAUDE.md`, `README.md`, `MULTI_TENANT.md`,
          # `llms.txt`, etc.) match nothing here, so the test/build/lint/security
          # jobs gated on these outputs cleanly skip — keeping doc PRs fast.
          # CI workflow changes still trigger every component so reviewers see
          # the consequences of pipeline edits.
          #
          # NOTE: do not add `!tools/**` (or any other `!pattern`) here. Under
          # dorny/paths-filter's default `predicate-quantifier: some`, a `!`
          # entry is OR'd as its own positive predicate matching every file
          # outside the inner glob — it does NOT subtract from the list. Adding
          # `!tools/**` would make the filter true for every non-tools file
          # (including all of `wiki/**`), defeating the doc-only skip. The
          # `**/*.go` pattern below already matches `tools/**/*.go`, so tool
          # Go-file changes correctly re-run the framework matrix without help
          # from a negation.
          #
          # COVERAGE COMPLETENESS — these two filters scope the per-module
          # lint/build/security/vuln jobs, but they must NOT gate the coverage
          # run independently. SonarCloud analyzes the framework and the migrate
          # tool as a single project fed by one merged coverage.out, assembled
          # from the framework-test, framework-integration-test, and
          # migrate-tool-test jobs. If the coverage run were gated per-module, a
          # change touching only one module would upload a report missing the
          # other module's coverage, and SonarCloud would score that module as
          # 0% covered — e.g. a renovate bump to `tools/migration/go.mod`
          # (framework filter false) collapsed framework coverage from ~90% to
          # ~4% and reddened the gate. To prevent that, the coverage run gates on
          # the explicit `code` filter below — NOT on framework/migrate_tool —
          # so it always runs all three coverage jobs together and uploads a
          # complete report; doc-only PRs match nothing and still skip it.
          #
          # `code` is defined explicitly (not inferred as framework||migrate_tool)
          # because that union omits non-Go scan inputs — most importantly
          # sonar-project.properties (a Sonar-config-only PR would otherwise set
          # code=false and skip the scan). It is the UNION of every real non-doc
          # path in framework + migrate_tool — note the tools/migration manifests
          # must be listed here too, since framework's root-anchored go.mod/go.sum/
          # Makefile do NOT match the nested tools/migration copies — PLUS
          # sonar-project.properties and the go.work/go.work.sum workspace files.
          # Keep it free of `!` negations (see the NOTE above) so docs still skip.
          filters: |
            framework:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - '.golangci.yml'
              - '.github/workflows/ci-v2.yml'
            migrate_tool:
              - 'tools/migration/**/*.go'
              - 'tools/migration/go.mod'
              - 'tools/migration/go.sum'
              - 'tools/migration/Makefile'
              - '.github/workflows/ci-v2.yml'
            code:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'go.work'
              - 'go.work.sum'
              - 'Makefile'
              - '.golangci.yml'
              - 'sonar-project.properties'
              - '.github/workflows/ci-v2.yml'
              - 'tools/migration/go.mod'
              - 'tools/migration/go.sum'
              - 'tools/migration/Makefile'

  # ============================================================================
  # Framework CI Jobs (conditional on framework changes)
  # ============================================================================

  framework-test:
    permissions:
      contents: read
    needs: changes
    # Gates on `code` (not `framework`) so framework coverage is regenerated on
    # ANY non-doc change — including tools/migration-only bumps — keeping the
    # merged SonarCloud report complete. See the `code` filter rationale.
    if: needs.changes.outputs.code == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run tests (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          set -euo pipefail
          # Test all packages - tools/* are separate modules, excluded automatically
          go test -race -cover -covermode=atomic -coverpkg=./... -coverprofile=coverage.out ./...

      - name: Enforce ADR-026 allocation guards (no -race)
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -euo pipefail
          # The race detector inflates testing.AllocsPerRun counts, so these guards skip
          # under -race (server/alloc_guard_*_test.go). Run them without -race so the
          # ADR-026 zero-overhead invariant (typed-path allocs/op ceiling + echo-native
          # default chain) is actually enforced on PRs, not silently skipped. Delegates to
          # the `make test-alloc` target so the command lives in exactly one place.
          make test-alloc

      - name: Run tests (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $packages = go list ./... | Where-Object { $_ -notmatch '/tools(/|$)' }
          if (-not $packages) {
            Write-Host "No packages found to test"
            exit 1
          }

          $testOutput = go test -race $packages 2>&1
          $exitCode = $LASTEXITCODE

          if ($exitCode -eq 0) {
            Write-Host $testOutput
            exit 0
          }

          Write-Host "Initial test run failed, re-running per package to evaluate failures" -ForegroundColor Yellow
          $knownPatterns = @(
            'Expected /tmp.*got D:'
          )
          $unexpectedFailure = $false

          foreach ($pkg in $packages) {
            Write-Host "Re-testing package: $pkg" -ForegroundColor Cyan
            $pkgOutput = go test -race $pkg 2>&1
            $pkgExitCode = $LASTEXITCODE

            if ($pkgExitCode -eq 0) {
              Write-Host $pkgOutput
              continue
            }

            $isKnownIssue = $false
            foreach ($pattern in $knownPatterns) {
              if ($pkgOutput -match $pattern) {
                Write-Host "Known Windows-specific issue detected in ${pkg}: $pattern" -ForegroundColor Yellow
                $isKnownIssue = $true
                break
              }
            }

            if (-not $isKnownIssue) {
              Write-Host "Unexpected test failure in $pkg" -ForegroundColor Red
              Write-Host $pkgOutput
              $unexpectedFailure = $true
            } else {
              Write-Host $pkgOutput
            }
          }

          if ($unexpectedFailure) {
            exit 1
          }

          Write-Host "All unexpected Windows test failures resolved or matched known issues." -ForegroundColor Green
          exit 0

      - name: Upload unit test coverage artifact (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-unit
          path: coverage.out
          retention-days: 1

  framework-integration-test:
    permissions:
      contents: read
    needs: changes
    # Gates on `code` so integration coverage is part of every merged report.
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    env:
      # Provides the real Flyway binary the integration test runs against; the
      # migration/testdata/flyway files are captured JSON-output samples used by
      # the parser unit tests. Flyway 12.x and later ship only from Redgate's own
      # distribution server (Maven Central stopped publishing the self-contained
      # platform CLI tarballs mid-11.x; see the Install step).
      # renovate: datasource=github-releases depName=flyway/flyway
      FLYWAY_VERSION: 13.0.0
      FLYWAY_SHA256: f199356e0a1ed15e94268a39f97e9bd4307a467b712ee745ceb4d7e7565690d9

    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Pre-pull container images
        run: |
          echo "Warming Docker cache with container images..."
          docker pull postgres:17.10-alpine &
          docker pull gvenzl/oracle-free:23.26.2-slim &
          docker pull rabbitmq:3.13.7-management-alpine &
          docker pull redis:7.4.9-alpine &
          wait
          echo "All container images cached"

      - name: Cache Flyway CLI
        id: cache-flyway
        # The SHA256 is part of the cache key so a version/digest bump
        # invalidates the cached tarball automatically.
        uses: actions/cache@v6
        with:
          path: /tmp/flyway-${{ env.FLYWAY_VERSION }}
          key: flyway-${{ env.FLYWAY_VERSION }}-${{ env.FLYWAY_SHA256 }}

      - name: Install Flyway CLI
        if: steps.cache-flyway.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          # Flyway 12.x and later are distributed only from Redgate's server —
          # Maven Central stopped publishing the self-contained -linux-x64.tar.gz
          # mid-11.x (last one is 11.8.2). The SHA256 check below keeps this host
          # integrity-pinned.
          url="https://download.red-gate.com/maven/release/com/redgate/flyway/flyway-commandline/${FLYWAY_VERSION}/flyway-commandline-${FLYWAY_VERSION}-linux-x64.tar.gz"
          curl -fsSL "$url" -o /tmp/flyway.tar.gz
          actual="$(sha256sum /tmp/flyway.tar.gz | awk '{print $1}')"
          if [ "$actual" != "$FLYWAY_SHA256" ]; then
            echo "Flyway tarball checksum mismatch:"
            echo "  expected: $FLYWAY_SHA256"
            echo "  actual:   $actual"
            echo "If the bump is intentional, update FLYWAY_SHA256 in this workflow."
            exit 1
          fi
          tar -xzf /tmp/flyway.tar.gz -C /tmp

      - name: Wire Flyway onto PATH
        run: |
          sudo ln -sf "/tmp/flyway-${FLYWAY_VERSION}/flyway" /usr/local/bin/flyway
          flyway --version | head -3

      - name: Run integration tests
        run: |
          set -euo pipefail
          docker info >/dev/null 2>&1 || { echo "Docker is not running"; exit 1; }
          echo "Running integration tests with testcontainers..."
          # Build tag controls which tests run - only integration tests will execute.
          # -timeout 15m is an interim safeguard for the ADR-020 rollout window;
          # revert (or hold at 15m) once schema-per-test proves stable across
          # 20 consecutive green runs (issue #404).
          go test -race -parallel 2 -timeout 15m -tags=integration -covermode=atomic -coverpkg=./... -coverprofile=coverage-integration.out ./...

      - name: Upload integration test coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-integration
          path: coverage-integration.out
          retention-days: 1

  framework-merge-coverage:
    permissions:
      contents: read
    needs: [changes, framework-test, framework-integration-test, migrate-tool-test]
    if: |
      always() &&
      needs.changes.result == 'success' &&
      needs.changes.outputs.code == 'true' &&
      (needs.framework-test.result == 'success' || needs.framework-test.result == 'skipped') &&
      (needs.framework-integration-test.result == 'success' || needs.framework-integration-test.result == 'skipped') &&
      (needs.migrate-tool-test.result == 'success' || needs.migrate-tool-test.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      # All three coverage jobs gate on `code`, so on any non-doc change they
      # all ran and uploaded their artifacts. Download them unconditionally —
      # a missing artifact is a real failure and the merge guard below catches it.
      - name: Download unit test coverage
        uses: actions/download-artifact@v8
        with:
          name: coverage-unit
          path: .

      - name: Download integration test coverage
        uses: actions/download-artifact@v8
        with:
          name: coverage-integration
          path: .

      - name: Download migrate tool coverage
        uses: actions/download-artifact@v8
        with:
          name: migrate-tool-coverage-report
          path: tools/migration

      - name: Merge coverage files
        run: |
          set -euo pipefail

          echo "=== Coverage Merge Process ==="
          echo "Checking for available coverage files..."

          # Check which coverage files exist
          has_framework_unit=false
          has_framework_integration=false
          has_migrate_tool=false

          if [ -f coverage.out ]; then
            echo "✓ Framework unit tests coverage found"
            has_framework_unit=true
          fi

          if [ -f coverage-integration.out ]; then
            echo "✓ Framework integration tests coverage found"
            has_framework_integration=true
          fi

          if [ -f tools/migration/coverage.out ]; then
            echo "✓ Migrate tool coverage found"
            has_migrate_tool=true
          fi

          # Defense-in-depth: the report uploaded to SonarCloud must be COMPLETE.
          # This job only runs on non-doc (`code`) changes, where framework-test,
          # framework-integration-test, and migrate-tool-test all run and upload
          # their coverage. If any part is missing here, a partial report would
          # mis-score the absent module as 0% covered — the failure mode that
          # collapsed framework coverage from ~90% to ~4% on tools-only pushes.
          # Fail loudly rather than upload an incomplete report.
          missing=""
          [ "$has_framework_unit" = true ]        || missing="$missing framework-unit(coverage.out)"
          [ "$has_framework_integration" = true ] || missing="$missing framework-integration(coverage-integration.out)"
          [ "$has_migrate_tool" = true ]          || missing="$missing migrate-tool(tools/migration/coverage.out)"
          if [ -n "$missing" ]; then
            echo "❌ ERROR: coverage report is incomplete — missing:$missing"
            echo "    Refusing to upload a partial coverage report to SonarCloud."
            echo "    Each coverage producer must have run and uploaded its artifact."
            exit 1
          fi

          echo ""
          echo "=== Coverage File Validation ==="

          # Validate framework unit coverage
          if [ "$has_framework_unit" = true ]; then
            unit_lines=$(wc -l < coverage.out)
            echo "Framework unit coverage: $unit_lines lines"

            # Check if file is suspiciously small (should be >10k lines for full framework)
            if [ "$unit_lines" -lt 10000 ]; then
              echo "⚠️  WARNING: Framework unit coverage is unusually small ($unit_lines lines)"
              echo "    Expected: >10,000 lines for full framework coverage"
            fi

            # Check first non-mode line to verify it's framework code (not tool code)
            first_package=$(sed -n '2p' coverage.out | cut -d':' -f1)
            if echo "$first_package" | grep -q "tools/"; then
              echo "❌ ERROR: Framework coverage file contains tool packages!"
              echo "    First package: $first_package"
              echo "    This indicates artifact download overwrote framework coverage"
              exit 1
            else
              echo "✓ Framework coverage verified (starts with: $first_package)"
            fi
          fi

          # Validate integration coverage
          if [ "$has_framework_integration" = true ]; then
            integration_lines=$(wc -l < coverage-integration.out)
            echo "Integration coverage: $integration_lines lines"

            if [ "$integration_lines" -lt 1000 ]; then
              echo "⚠️  WARNING: Integration coverage is small ($integration_lines lines)"
            else
              echo "✓ Integration coverage looks reasonable"
            fi
          fi

          # Merge coverage files using simple concatenation
          # This approach is optimal for our use case because:
          # - No coverage line overlaps (different test suites cover different code paths)
          # - All files from same source code (same Go version, same build)
          # - All use covermode=atomic consistently
          # - Zero external dependencies (tools like gocovmerge would add unnecessary complexity)
          echo ""
          echo "Merging coverage files..."

          # Start with framework unit coverage if available, otherwise create empty file with mode line
          if [ "$has_framework_unit" = true ]; then
            cat coverage.out > coverage-merged.out
          else
            echo "mode: atomic" > coverage-merged.out
          fi

          # Append framework integration coverage (skip mode line)
          if [ "$has_framework_integration" = true ]; then
            tail -n +2 coverage-integration.out >> coverage-merged.out
          fi

          # Append migrate tool coverage (skip mode line)
          if [ "$has_migrate_tool" = true ]; then
            tail -n +2 tools/migration/coverage.out >> coverage-merged.out
          fi

          # Show summary
          echo ""
          echo "=== Coverage Merge Summary ==="
          if [ "$has_framework_unit" = true ]; then
            wc -l coverage.out | awk '{print "Framework unit:       " $1 " lines"}'
          fi
          if [ "$has_framework_integration" = true ]; then
            wc -l coverage-integration.out | awk '{print "Framework integration:" $1 " lines"}'
          fi
          if [ "$has_migrate_tool" = true ]; then
            wc -l tools/migration/coverage.out | awk '{print "Migrate tool coverage:" $1 " lines"}'
          fi
          wc -l coverage-merged.out | awk '{print "Merged total:         " $1 " lines"}'

          # Rename merged file to coverage.out for SonarCloud
          mv coverage-merged.out coverage.out

          echo ""
          echo "✓ Coverage merge complete - ready for SonarCloud"

      - name: Upload merged coverage for SonarCloud
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 1

  framework-build:
    permissions:
      contents: read
    needs: changes
    if: needs.changes.outputs.framework == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          set -euo pipefail
          packages=$(go list ./... | grep -vE '/tools(/|$)')
          if [ -n "$packages" ]; then
            go build -v $packages
          else
            echo "No packages found to build"
            exit 1
          fi

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $packages = go list ./... | Where-Object { $_ -notmatch '/tools(/|$)' }
          if (-not $packages) {
            Write-Host "No packages found to build"
            exit 1
          }
          go build -v $packages

      - name: Verify go mod (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  # ============================================================================
  # Migration Tool CI Jobs (conditional on tools/migration changes)
  # ============================================================================

  migrate-tool-test:
    permissions:
      contents: read
    needs: changes
    # Gates on `code` (not `migrate_tool`) so the tool's coverage is part of
    # every merged report — otherwise a framework-only change would omit it and
    # SonarCloud would score tools/migration as 0% covered. The tool's other
    # jobs (build/lint/security/vuln) stay scoped to `migrate_tool` below.
    if: needs.changes.outputs.code == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: tools/migration

    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: tools/migration/go.mod
          cache: true
          cache-dependency-path: tools/migration/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run tests (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          set -euo pipefail
          packages=$(go list ./cmd/... ./internal/...)
          if [ -z "$packages" ]; then
            echo "No packages found to test"
            exit 1
          fi
          for pkg in $packages; do
            echo "Testing package: $pkg"
            go test -race "$pkg"
          done
          # Coverage failures fail the job — silent absence is what created
          # the SonarCloud-coverage gap this tool fixes.
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            echo "Generating coverage report for SonarCloud"
            go test -race -coverprofile=coverage.out -covermode=atomic $packages
          fi

      - name: Run tests (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          $packages = go list ./cmd/... ./internal/...
          if (-not $packages) {
            Write-Host "No packages found to test"
            exit 1
          }
          go test -race $packages
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload coverage artifact for SonarCloud (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: migrate-tool-coverage-report
          path: tools/migration/coverage.out
          retention-days: 1
          if-no-files-found: ignore

  migrate-tool-build:
    permissions:
      contents: read
    needs: changes
    if: needs.changes.outputs.migrate_tool == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: tools/migration

    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: tools/migration/go.mod
          cache: true
          cache-dependency-path: tools/migration/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build and validate CLI (Unix)
        if: matrix.os != 'windows-latest'
        run: make validate-cli

      - name: Build and validate CLI (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          go build -ldflags "-X main.version=dev" -o go-bricks-migrate.exe ./cmd/go-bricks-migrate
          ./go-bricks-migrate.exe version
          ./go-bricks-migrate.exe --help
          Write-Host "CLI validation passed"

      - name: Verify go mod (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  lint-migrate-tool:
    permissions:
      contents: read
    needs: changes
    if: needs.changes.outputs.migrate_tool == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: tools/migration/go.mod
          cache: true
          cache-dependency-path: tools/migration/go.sum

      - name: golangci-lint (migrate tool)
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a  # v9.3.0
        with:
          version: v2.12.2
          working-directory: tools/migration
          args: --timeout=5m

  security-migrate-tool:
    permissions:
      contents: read
    needs: changes
    if: needs.changes.outputs.migrate_tool == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/migration

    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: tools/migration/go.mod
          cache: true
          cache-dependency-path: tools/migration/go.sum

      - name: Run gosec (migrate tool)
        run: make sec

  # ============================================================================
  # Shared Jobs (run for framework OR tool OR both)
  # ============================================================================

  lint-framework:
    permissions:
      contents: read
    needs: changes
    if: needs.changes.outputs.framework == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: golangci-lint (framework)
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a  # v9.3.0
        env:
          # Scope the run to the root (framework) module. `--skip-dirs=tools` was
          # a golangci-lint v1 flag (deprecated in v2). `./...` already stops at
          # the tools/migration module boundary, but golangci-lint's v2 workspace
          # mode would otherwise pull that unioned module in; GOWORK=off disables
          # the workspace so the separately-versioned submodule (covered by
          # lint-migrate-tool) can't leak into framework findings, and lint
          # resolves against the framework's own go.mod — the dependency view its
          # consumers actually see.
          GOWORK: "off"
        with:
          version: v2.12.2
          args: --timeout=5m

  security-framework:
    permissions:
      contents: read
    needs: changes
    if: needs.changes.outputs.framework == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Run gosec (framework)
        run: make sec

  vuln-framework:
    permissions:
      contents: read
    needs: changes
    if: needs.changes.outputs.framework == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Run govulncheck (framework)
        run: make vuln

  vuln-migrate-tool:
    permissions:
      contents: read
    needs: changes
    if: needs.changes.outputs.migrate_tool == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/migration
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: tools/migration/go.mod
          cache: true
          cache-dependency-path: tools/migration/go.sum
      - name: Run govulncheck (migrate tool)
        run: make vuln

  vuln-weekly:
    permissions:
      contents: read
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum
            tools/migration/go.sum
      - name: Run govulncheck (both modules)
        run: |
          set +e
          make vuln; fw=$?
          make -C tools/migration vuln; cli=$?
          if [ "$fw" -ne 0 ] || [ "$cli" -ne 0 ]; then
            echo "::error::govulncheck found vulnerabilities (framework exit=$fw, migrate-tool exit=$cli)"
            exit 1
          fi

  # ============================================================================
  # SonarCloud (framework + tool coverage)
  # ============================================================================

  sonarcloud:
    permissions:
      contents: read
    name: SonarCloud
    needs: [changes, framework-merge-coverage]
    if: |
      always() &&
      needs.changes.result == 'success' &&
      needs.changes.outputs.code == 'true' &&
      needs.framework-merge-coverage.result == 'success'
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Download coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: coverage-report
          path: .

      - name: Scan
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f  # v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ============================================================================
  # Exported-API compatibility gate (apidiff — delta over origin/main)
  # ----------------------------------------------------------------------------
  # Diffs the PR head's exported API surface (root module only — internal/ is
  # auto-ignored by apidiff and GOWORK=off excludes the separately-versioned
  # tools/migration submodule) against the latest release tag, then SUBTRACTS
  # the incompatible changes origin/main already carries. The gate fails only on
  # the DELTA — breaks THIS PR introduces — not acknowledged-but-unreleased
  # breaks already merged to main (those would otherwise false-fail every later
  # PR until the next release). FAILS on a NEW INCOMPATIBLE change UNLESS the
  # squash PR title carries a conventional-commit '!' marker (feat!:/fix(scope)!:
  # …) or the PR has the 'breaking-approved' label. This catches ACCIDENTAL
  # breaks that would otherwise ship as a patch/minor — release-please derives
  # the bump from the squash PR title, so the same '!' that bypasses the gate
  # also drives the version bump (no drift). The tag stays the baseline so the
  # cumulative report still measures drift since the last GA release.
  #
  # Runs on pull_request ONLY: the escape hatch reads the PR title, which exists
  # only in PR context. On push to main (post-merge) the break is already
  # accepted, so the job skips there and ci-ok tolerates the skip.
  apidiff:
    permissions:
      contents: read
    name: API compatibility
    needs: changes
    if: needs.changes.outputs.framework == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # need full history + tags to build the baseline snapshot
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install apidiff
        # Pinned for reproducibility (x/exp ships only pseudo-versions). The
        # annotation lets Renovate bump this 'go install …@version' literal,
        # which its gomod manager cannot see (see renovate.json customManagers).
        # renovate: datasource=go depName=golang.org/x/exp
        run: go install golang.org/x/exp/cmd/apidiff@v0.0.0-20260709172345-9ea1abe57597

      - name: Resolve latest release tag (baseline)
        id: baseline
        run: |
          set -euo pipefail
          git fetch --tags --force --quiet
          # GA tags only (vX.Y.Z) — exclude pre-releases (vX.Y.Z-rc1) so the
          # baseline is always the latest stable release. `|| true` keeps the
          # no-tag case on the skip path below rather than aborting on pipefail.
          base_tag="$(git tag --list 'v*' --sort=-v:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)"
          if [ -z "$base_tag" ]; then
            echo "::warning::No GA release tag found; skipping API-compatibility check (no baseline to diff against)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Baseline release tag: $base_tag"
          echo "base_tag=$base_tag" >> "$GITHUB_OUTPUT"

      - name: Build baseline API snapshot (at latest tag)
        if: steps.baseline.outputs.skip != 'true'
        env:
          BASE_TAG: ${{ steps.baseline.outputs.base_tag }}
          # GOWORK=off restricts the diff to the ROOT module's packages and
          # excludes the separately-versioned tools/migration submodule (only
          # unioned in via go.work). internal/ is auto-ignored by apidiff.
          GOWORK: "off"
        run: |
          set -euo pipefail
          # Defensive pre-clean: a prior cancelled run on a reused (self-hosted)
          # runner could leave the path behind, which would fail `worktree add`.
          git worktree remove --force /tmp/apidiff-base 2>/dev/null || true
          rm -rf /tmp/apidiff-base
          git worktree add --detach /tmp/apidiff-base "$BASE_TAG"
          ( cd /tmp/apidiff-base \
            && GOWORK=off apidiff -m -w /tmp/apidiff-base.snapshot github.com/gaborage/go-bricks )

      - name: Build origin/main API snapshot (unreleased baseline)
        if: steps.baseline.outputs.skip != 'true'
        env:
          GOWORK: "off"
        run: |
          set -euo pipefail
          # Defensive pre-clean, matching the base-snapshot step.
          git worktree remove --force /tmp/apidiff-main 2>/dev/null || true
          rm -rf /tmp/apidiff-main
          git fetch --quiet origin main
          git worktree add --detach /tmp/apidiff-main origin/main
          ( cd /tmp/apidiff-main \
            && GOWORK=off apidiff -m -w /tmp/apidiff-main.snapshot github.com/gaborage/go-bricks )

      - name: Build PR-head API snapshot
        if: steps.baseline.outputs.skip != 'true'
        env:
          GOWORK: "off"
        run: GOWORK=off apidiff -m -w /tmp/apidiff-head.snapshot github.com/gaborage/go-bricks

      - name: Diff exported API and enforce escape hatch
        if: steps.baseline.outputs.skip != 'true'
        env:
          GOWORK: "off"
          BASE_TAG: ${{ steps.baseline.outputs.base_tag }}
          # Pass PR title/labels via env (NOT inline ${{ }} in the script body) so
          # a crafted PR title cannot inject shell — the values are read as data.
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          set -euo pipefail

          # apidiff writes the change list to STDOUT and "Ignoring internal
          # package …" notices to STDERR, so stdout alone is the signal. It
          # exits 0 whether or not changes exist, and non-zero ONLY on a real
          # tool/build error. NO `|| true` on the load-bearing captures below:
          # under `set -e` a tool failure aborts the step, so the gate fails
          # CLOSED instead of silently reporting "no breaks".
          echo "::group::Full apidiff report (base=$BASE_TAG vs PR head)"
          GOWORK=off apidiff -m /tmp/apidiff-base.snapshot /tmp/apidiff-head.snapshot || true
          echo "::endgroup::"

          # Incompatible changes the PR head has vs the release tag, and the set
          # origin/main already has vs the same tag. NO `|| true`: under `set -e`
          # a tool error aborts the step, so the gate fails CLOSED.
          incompat_head="$(GOWORK=off apidiff -incompatible -m \
            /tmp/apidiff-base.snapshot /tmp/apidiff-head.snapshot)"
          incompat_main="$(GOWORK=off apidiff -incompatible -m \
            /tmp/apidiff-base.snapshot /tmp/apidiff-main.snapshot)"

          # Delta = breaks THIS PR introduces = lines in head-set NOT in main-set.
          # `comm -23` requires sorted, de-duplicated, blank-free inputs; the
          # `grep -v '^[[:space:]]*$'` drops blank lines so an empty apidiff
          # capture cannot inject a spurious empty-line "difference". Bash process
          # substitution `<()` — the ubuntu-latest runner's default shell is bash;
          # a process substitution's own exit status is not propagated to `comm`,
          # so `grep` returning 1 on all-blank input never fails the step.
          delta="$(comm -23 \
            <(printf '%s\n' "$incompat_head" | grep -v '^[[:space:]]*$' | sort -u) \
            <(printf '%s\n' "$incompat_main" | grep -v '^[[:space:]]*$' | sort -u))"

          if [ -z "$delta" ]; then
            echo "✅ No NEW incompatible exported-API changes vs origin/main (delta over already-merged breaks)."
            echo "   (Any breaks vs $BASE_TAG are already acknowledged on main and pending release.)"
            exit 0
          fi

          echo "::warning::NEW incompatible exported-API changes introduced by this PR vs origin/main (delta over already-merged breaks):"
          printf '%s\n' "$delta"

          # ---- Escape hatch (only evaluated when a break exists) ----
          # 1) Conventional-commit '!' marker anchored at the ':' position.
          if printf '%s' "$PR_TITLE" | grep -Eq '^[a-zA-Z]+(\([^)]*\))?!:'; then
            echo "✅ Breaking change ACKNOWLEDGED via '!' in PR title: $PR_TITLE"
            exit 0
          fi

          # 2) 'breaking-approved' label — exact array-element match (not a
          # substring grep, which could match e.g. a 'pre-breaking-approved' label).
          if printf '%s' "$PR_LABELS" | jq -e 'any(.[]?; . == "breaking-approved")' >/dev/null 2>&1; then
            echo "✅ Breaking change ACKNOWLEDGED via 'breaking-approved' label."
            exit 0
          fi

          echo "::error::Incompatible exported-API change shipped without acknowledgement (delta vs origin/main, over already-merged breaks)."
          echo "Retitle the squash PR with a '!' breaking marker (e.g. 'feat!: …' /"
          echo "'fix(scope)!: …') so release-please bumps correctly, or add the"
          echo "'breaking-approved' label if the break is intentional and reviewed."
          exit 1

      - name: Clean up API-snapshot worktrees
        if: always() && steps.baseline.outputs.skip != 'true'
        run: |
          git worktree remove --force /tmp/apidiff-base || true
          git worktree remove --force /tmp/apidiff-main || true

  # ============================================================================
  # CI gate (fan-in aggregator — the single required status check on main)
  # ----------------------------------------------------------------------------
  # Branch protection requires only THIS check. It depends on every PR-relevant
  # leaf job and fails if any of them failed or was cancelled. 'skipped' counts
  # as success so doc-only PRs (where the path-filtered jobs skip) still pass —
  # the same always()+skipped-tolerant idiom used by framework-merge-coverage
  # and sonarcloud above. vuln-weekly is schedule-only and intentionally absent.
  # When you add a new PR job, add it to `needs:` here or it stays unenforced.
  # ============================================================================
  ci-ok:
    permissions:
      contents: read
    name: ci-ok
    if: always() && github.event_name != 'schedule'
    needs:
      - changes
      - framework-test
      - framework-integration-test
      - framework-merge-coverage
      - framework-build
      - migrate-tool-test
      - migrate-tool-build
      - lint-migrate-tool
      - security-migrate-tool
      - lint-framework
      - security-framework
      - vuln-framework
      - vuln-migrate-tool
      - apidiff
      - sonarcloud
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs passed
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          echo "Aggregated job results:"
          printf '%s\n' "$NEEDS_JSON"
          # Fail only on 'failure'/'cancelled'. 'success' and 'skipped' pass —
          # path-filtered jobs legitimately skip on doc-only PRs.
          failed="$(printf '%s' "$NEEDS_JSON" \
            | jq -r 'to_entries[]
                     | select(.value.result == "failure" or .value.result == "cancelled")
                     | .key')"
          if [ -n "$failed" ]; then
            echo "::error::Required job(s) did not pass:"
            printf '  - %s\n' $failed
            exit 1
          fi
          echo "✅ All required jobs passed (or were skipped on a doc-only PR)."
