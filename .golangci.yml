version: "2"
run:
  tests: true
linters:
  enable:
    - bodyclose                 # checks whether HTTP response body is closed successfully
    - copyloopvar               # checks for unnecessary loop-variable copies (Go 1.22+ per-iteration vars)
    - dogsled                   # checks assignments with too many blank identifiers
    - dupl                      # code clone detection
    - durationcheck             # checks for two durations multiplied together
    - errcheck                  # checks for unchecked errors
    - errname                   # checks that error variables/types follow the errFoo/FooError convention
    - errorlint                 # finds code that may cause problems with the Go 1.13 error wrapping scheme
    - exhaustive                # checks exhaustiveness of enum switch statements
    - gocheckcompilerdirectives # validates go compiler directive comments (//go:)
    - gochecknoinits            # checks that no init functions are present
    - goconst                   # finds repeated strings that could be replaced by a constant
    - gocritic                  # provides diagnostics that check for bugs, performance and style issues
    - gocyclo                   # computes and checks the cyclomatic complexity of functions
    - goprintffuncname          # checks that printf-like functions are named with f at the end
    - gosec                     # inspects source code for security problems
    - govet                     # reports suspicious constructs (go vet)
    - ineffassign               # detects when assignments to existing variables are not used
    - lll                       # reports long lines
    - loggercheck               # checks key-value pairs for common logger libraries (zap, zerolog, ...)
    - makezero                  # finds slice declarations with non-zero initial length used with append
    - misspell                  # finds commonly misspelled English words in comments
    - musttag                   # enforces field tags in (un)marshaled structs
    - nakedret                  # finds naked returns in functions greater than a specified function length
    - nilerr                    # finds code that returns nil even if it checks that the error is not nil
    - noctx                     # finds sending HTTP request without context.Context
    - nolintlint                # reports ill-formed or insufficient nolint directives
    - prealloc                  # finds slice declarations that could potentially be preallocated
    - revive                    # fast, configurable, extensible, flexible, and beautiful linter for Go
    - rowserrcheck              # checks whether Err of rows is checked successfully
    - spancheck                 # checks for mistakes with OpenTelemetry/Census spans
    - sqlclosecheck             # checks that sql.Rows and sql.Stmt are closed
    - staticcheck               # staticcheck is a go vet on steroids, applying a ton of static analysis checks
    - unconvert                 # removes unnecessary type conversions
    - unparam                   # reports unused function parameters
    - wastedassign              # finds wasted assignment statements
    - whitespace                # detection of leading and trailing whitespace
    - zerologlint               # detects the wrong usage of zerolog that a user forgets to dispatch with Send or Msg
  settings:
    dupl:
      threshold: 100
    exhaustive:
      default-signifies-exhaustive: true
    goconst:
      min-len: 4
      min-occurrences: 3
    gocritic:
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    gocyclo:
      min-complexity: 15
    govet:
      enable:
        - shadow  # reports shadowed variables (disabled by default)
    lll:
      line-length: 215
    misspell:
      locale: US
    nolintlint:
      require-explanation: false
      require-specific: false
      allow-unused: false
    revive:
      confidence: 0
    staticcheck:
      checks:
        - all
        - -ST1000
        - -ST1003
        - -ST1016
        - -ST1020
        - -ST1021
        - -ST1022
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - errcheck
          - goconst
          - gocyclo
          - gosec
          - ineffassign
          - rowserrcheck
        path: _test\.go
      - linters:
          - lll
        source: '^//go:generate '
      - linters:
          - staticcheck
        text: 'SA9003:'
      # zerologlint cannot follow the LogEventAdapter wrapper which dispatches via its own Send/Msg
      - linters:
          - zerologlint
        path: logger/adapter\.go
      # Intentional "testing" subpackages for test utilities (imported with aliases)
      - linters:
          - revive
        path: "(cache|database|observability)/testing/|^testing/"
        text: "var-naming: avoid package names"
      # trace package intentionally named to match its domain
      - linters:
          - revive
        path: "trace/"
        text: "var-naming: avoid package names"
    paths:
      - third_party$
      - builtin$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
